name: Build Jarvis IPA

on:
  push:
    branches: [claude/jarvis-iphone-voice-assistant-e5wkjw, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned — AltServer signs at install time)
        run: |
          set -o pipefail
          xcodebuild \
            -project Jarvis.xcodeproj \
            -scheme Jarvis \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/Jarvis.app" Payload/
          zip -qry Jarvis.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-ipa
          path: Jarvis.ipa
          retention-days: 30
