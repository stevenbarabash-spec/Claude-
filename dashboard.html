<title>Command — Steven's Work Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ground:  #0D1B2A;
    --surface: #152233;
    --surface2:#1A2B3F;
    --rule:    #1E3048;
    --ink:     #C9D6E3;
    --muted:   #5E7A96;
    --accent:  #3D8EBD;
    --urgent:  #D47A35;
    --done:    #38996A;
    --warn:    #C8A228;

    --radius: 6px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --sans: 'SF Pro Display', -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  }

  html, body {
    background: var(--ground);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    background: var(--ground);
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .calendar-link {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 5px 10px;
    transition: border-color 0.15s;
  }

  .calendar-link:hover { border-color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 28px;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── TODAY STRIP ─────────────────────────────── */
  .today-strip {
    padding: 16px 32px;
    border-bottom: 1px solid var(--rule);
    background: linear-gradient(180deg, rgba(61,142,189,0.06), transparent);
  }

  .today-strip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .today-strip-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--accent);
  }

  .today-strip-title span { color: var(--muted); font-weight: 400; letter-spacing: 0.02em; text-transform: none; }

  .today-strip-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .today-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 12px;
    max-width: 320px;
  }

  .today-chip.overdue { border-left-color: var(--urgent); }
  .today-chip.deadline { border-left-color: var(--done); }

  .today-chip-title { color: var(--ink); line-height: 1.3; }
  .today-chip-sub { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

  .today-strip-empty {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── MAIN GRID ───────────────────────────────── */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  .col-projects {
    padding: 28px 32px;
    border-right: 1px solid var(--rule);
  }

  .col-timeline {
    padding: 28px 24px;
  }

  /* ── SECTION HEADERS ─────────────────────────── */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  /* ── PROJECT CARDS ───────────────────────────── */
  .project-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .project-card:hover { border-color: var(--accent); }

  .project-card.urgent { border-left: 3px solid var(--urgent); }
  .project-card.on-track { border-left: 3px solid var(--done); }
  .project-card.at-risk { border-left: 3px solid var(--warn); }

  .card-main {
    padding: 16px 18px 14px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .project-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
    text-wrap: balance;
  }

  .project-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-chip {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .chip-active    { background: rgba(61,142,189,0.15); color: var(--accent); }
  .chip-on-track  { background: rgba(56,153,106,0.15); color: var(--done); }
  .chip-at-risk   { background: rgba(200,162,40,0.15);  color: var(--warn); }
  .chip-urgent    { background: rgba(212,122,53,0.18);  color: var(--urgent); }
  .chip-done      { background: rgba(56,153,106,0.1);   color: var(--done); }
  .chip-paused    { background: rgba(94,122,150,0.15);  color: var(--muted); }

  /* ── PROGRESS BAR ────────────────────────────── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .progress-fill.fill-done { background: var(--done); }
  .progress-fill.fill-urgent { background: var(--urgent); }
  .progress-fill.fill-warn { background: var(--warn); }

  .progress-pct {
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    width: 32px;
    text-align: right;
  }

  /* ── CARD META ROW ───────────────────────────── */
  .card-meta {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .meta-key {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-val {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .meta-val.overdue { color: var(--urgent); }
  .meta-val.soon    { color: var(--warn); }

  /* ── CARD TASKS (mirrors right-column done state) ────────────── */
  .card-tasks-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
  }

  .card-tasks {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 8px;
  }

  .card-task-row {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-size: 12px;
  }

  .card-task-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .card-task-dot.done { background: var(--done); opacity: 1; }

  .card-task-title { color: var(--ink); line-height: 1.4; }
  .card-task-title.done-text { color: var(--muted); text-decoration: line-through; }

  /* ── ITERATIONS LOG ──────────────────────────── */
  .card-iterations {
    border-top: 1px solid var(--rule);
    background: var(--surface2);
  }

  .iterations-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    user-select: none;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: color 0.1s;
  }

  .iterations-toggle:hover { color: var(--ink); }

  .toggle-arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
  }

  .iterations-body {
    padding: 0 18px 12px;
    display: none;
  }

  .iterations-body.open { display: block; }

  .iter-item {
    display: flex;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
  }

  .iter-item:last-child { border-bottom: none; }

  .iter-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .iter-note { color: var(--ink); line-height: 1.45; }

  /* ── EMPTY STATE ─────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px 24px;
    text-align: center;
    border: 1px dashed var(--rule);
    border-radius: var(--radius);
    color: var(--muted);
  }

  .empty-grid {
    display: grid;
    grid-template-columns: repeat(3, 24px);
    gap: 5px;
    opacity: 0.35;
    margin-bottom: 4px;
  }

  .empty-dot {
    width: 24px;
    height: 24px;
    border-radius: 3px;
    background: var(--rule);
  }

  .empty-dot:nth-child(2) { background: var(--accent); opacity: 0.6; }
  .empty-dot:nth-child(5) { background: var(--accent); opacity: 0.3; }

  .empty-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .empty-sub {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
    max-width: 280px;
    line-height: 1.5;
  }

  /* ── TIMELINE / RIGHT COLUMN ─────────────────── */
  .deadline-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }

  .deadline-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    font-size: 13px;
  }

  .deadline-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-urgent { background: var(--urgent); }
  .dot-warn   { background: var(--warn); }
  .dot-ok     { background: var(--done); }

  .deadline-name { flex: 1; color: var(--ink); font-size: 12px; }

  .deadline-days {
    font-family: var(--mono);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    white-space: nowrap;
  }

  .deadline-days.overdue { color: var(--urgent); }
  .deadline-days.soon    { color: var(--warn); }

  /* ── TASK LIST ───────────────────────────────── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .task-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    font-size: 12px;
    transition: opacity 0.15s;
  }

  .task-item.is-done { opacity: 0.55; }

  .task-row {
    display: grid;
    grid-template-columns: 16px 1fr auto;
    gap: 8px;
    align-items: start;
  }

  .task-check {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--muted);
    border-radius: 3px;
    margin-top: 1px;
    flex-shrink: 0;
    cursor: pointer;
    background: none;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ground);
    font-size: 10px;
    line-height: 1;
    transition: background 0.15s, border-color 0.15s;
  }

  .task-check:hover { border-color: var(--accent); }
  .task-check:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .task-check.done {
    background: var(--done);
    border-color: var(--done);
  }

  .task-title {
    color: var(--ink);
    line-height: 1.4;
    background: none;
    border: none;
    text-align: left;
    font: inherit;
    padding: 0;
    cursor: pointer;
  }

  .task-title.done-text { color: var(--muted); text-decoration: line-through; }

  .task-due {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
  }

  .task-due:hover { color: var(--accent); }
  .task-due.overdue { color: var(--urgent); }

  .task-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding-left: 22px;
  }

  .task-action-btn {
    font-size: 9px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 3px 7px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .task-action-btn:hover { color: var(--accent); border-color: var(--accent); }
  .task-action-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .task-action-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink);
    background: var(--surface2);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 2px 6px;
  }

  /* ── WEEK STRIP ──────────────────────────────── */
  .week-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 24px;
  }

  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--rule);
  }

  .day-cell.today {
    background: rgba(61,142,189,0.12);
    border-color: var(--accent);
  }

  .day-name {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .day-num {
    font-family: var(--mono);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--ink);
  }

  .day-cell.today .day-num { color: var(--accent); }

  .day-dot-row {
    display: flex;
    gap: 2px;
    min-height: 5px;
  }

  .day-event-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  .day-event-dot.dot-urgent { background: var(--urgent); }

  @media (max-width: 780px) {
    .main { grid-template-columns: 1fr; }
    .col-projects { border-right: none; border-bottom: 1px solid var(--rule); }
    .header { flex-wrap: wrap; gap: 12px; }
    .header-stats { gap: 16px; }
  }
</style>

  <div class="header-left">
    <span class="wordmark">Command</span>
    <span class="header-date" id="header-date"></span>
    <a class="calendar-link" href="https://claude.ai/code/artifact/1fe0094f-aa31-40a5-b7c6-92cfd57b2edc" target="_blank" rel="noopener">Calendar →</a>

</header>

</section>

<div class="main">

  </aside>
</div>

// ── TASK STATE OVERRIDES (persisted in this browser) ──────────────────
// Lets tasks be checked off or rescheduled without a backend. Keyed by
// project name + task title, since the source JSON has no stable ids.
const OVERRIDES_KEY = 'command_task_overrides_v1';

function loadOverrides() {
  try {
    return JSON.parse(localStorage.getItem(OVERRIDES_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveOverrides(overrides) {
  localStorage.setItem(OVERRIDES_KEY, JSON.stringify(overrides));
}

function taskKey(projectName, title) {
  return `${projectName || '_standalone'}::${title}`;
}

let overrides = loadOverrides();

function applyOverrides() {
  DATA.projects.forEach(p => {
    (p.tasks || []).forEach(t => {
      const key = taskKey(p.name, t.title);
      if (overrides[key]) Object.assign(t, overrides[key]);
    });
  });
  DATA.tasks.forEach(t => {
    const key = taskKey(null, t.title);
    if (overrides[key]) Object.assign(t, overrides[key]);
  });
}

function setTaskOverride(projectName, title, patch) {
  const key = taskKey(projectName, title);
  overrides[key] = { ...(overrides[key] || {}), ...patch };
  saveOverrides(overrides);
  applyOverrides();
  buildProjects();
  buildDeadlines();
  buildTasks();
  buildStats();
  buildTodayStrip();
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

applyOverrides();

// ── UTILITIES ────────────────────────────────────────────────────────
const today = new Date();
today.setHours(0, 0, 0, 0);

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str + 'T00:00:00');
  return d;
}

function daysUntil(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  return Math.round((d - today) / 86400000);
}

function formatDays(n) {
  if (n === null) return '';
  if (n < 0)  return `${Math.abs(n)}d overdue`;
  if (n === 0) return 'due today';
  if (n === 1) return 'due tomorrow';
  return `${n}d left`;
}

function deadlineClass(n) {
  if (n === null) return '';
  if (n < 0)  return 'overdue';
  if (n <= 3) return 'soon';
  return '';
}

function dotClass(n) {
  if (n === null) return 'dot-ok';
  if (n <= 3)  return 'dot-urgent';
  if (n <= 7)  return 'dot-warn';
  return 'dot-ok';
}

function cardClass(project) {
  const n = daysUntil(project.deadline);
  if (project.status === 'done') return '';
  if (n !== null && n <= 3) return 'urgent';
  if (n !== null && n <= 7) return 'at-risk';
  return 'on-track';
}

function chipClass(status) {
  const map = {
    active: 'chip-active',
    'on-track': 'chip-on-track',
    'at-risk': 'chip-at-risk',
    urgent: 'chip-urgent',
    done: 'chip-done',
    paused: 'chip-paused',
  };
  return map[status] || 'chip-active';
}

function fillClass(pct) {
  if (pct >= 100) return 'fill-done';
  if (pct < 30)   return 'fill-urgent';
  return '';
}

function fmtDate(str) {
  if (!str) return '—';
  const d = parseDate(str);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── WEEK STRIP ────────────────────────────────────────────────────────
function buildWeekStrip() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';

  // Deadlines by date string for dots
  const deadlineDates = {};
  DATA.projects.forEach(p => {
    if (p.deadline) {
      if (!deadlineDates[p.deadline]) deadlineDates[p.deadline] = [];
      const n = daysUntil(p.deadline);
      deadlineDates[p.deadline].push(n !== null && n <= 3 ? 'urgent' : 'normal');
    }
  });

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    const dow = today.getDay();
    const startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - dow);
    const day = new Date(startOfWeek);
    day.setDate(startOfWeek.getDate() + i);

    const dateStr = day.toISOString().slice(0, 10);
    const isToday = day.getTime() === today.getTime();
    const dots = deadlineDates[dateStr] || [];

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '');
    cell.innerHTML = `
      <span class="day-name">${days[day.getDay()]}</span>
      <span class="day-num">${day.getDate()}</span>
      <span class="day-dot-row">${dots.map(t => `<span class="day-event-dot${t === 'urgent' ? ' dot-urgent' : ''}"></span>`).join('')}</span>
    `;
    strip.appendChild(cell);
  }
}

          ${n !== null ? `<div class="meta-item">

          ${p.nextMilestone ? `<div class="meta-item">

// ── DEADLINES ─────────────────────────────────────────────────────────
function buildDeadlines() {
  const list = document.getElementById('deadline-list');
  list.innerHTML = '';

  const sorted = DATA.projects
    .filter(p => p.deadline && p.status !== 'done')
    .map(p => ({ name: p.name, deadline: p.deadline, n: daysUntil(p.deadline) }))
    .sort((a, b) => a.n - b.n);

  if (!sorted.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0;">No upcoming deadlines.</div>`;
    return;
  }

  sorted.forEach(item => {
    const el = document.createElement('div');
    el.className = 'deadline-item';
    el.innerHTML = `
      <span class="deadline-dot ${dotClass(item.n)}"></span>
      <span class="deadline-name">${item.name}</span>
      <span class="deadline-days ${deadlineClass(item.n)}">${formatDays(item.n)}</span>`;
    list.appendChild(el);
  });
}

// ── TASKS ─────────────────────────────────────────────────────────────
// Per-task menu state: 'closed' | 'confirm' | 'reschedule'
const taskMenuState = new Map();

function buildTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = '';

  // Merge standalone tasks + project-level tasks
  const projTasks = DATA.projects.flatMap(p =>
    (p.tasks || []).map(t => ({ ...t, _project: p.name }))
  );
  const allTasks = [...DATA.tasks, ...projTasks];

  if (!allTasks.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0;">No tasks yet.</div>`;
    return;
  }

  const open = allTasks.filter(t => !t.done);
  const done = allTasks.filter(t => t.done);
  const all = [...open, ...done];

  all.forEach(t => {
    const n = daysUntil(t.due);
    const key = taskKey(t._project || null, t.title);
    const state = taskMenuState.get(key) || 'closed';

    const el = document.createElement('div');
    el.className = 'task-item' + (t.done ? ' is-done' : '');

    let actionsHtml = '';
    if (state === 'confirm') {
      actionsHtml = `
      <div class="task-actions">
        <button class="task-action-btn" data-key="${key}" data-action="confirm-done">${t.done ? 'Mark incomplete' : 'Mark done'}</button>
        <button class="task-action-btn" data-key="${key}" data-action="confirm-reschedule">Reschedule…</button>
        <button class="task-action-btn" data-key="${key}" data-action="confirm-cancel" style="opacity:.6">Cancel</button>
      </div>`;
    } else if (state === 'reschedule') {
      actionsHtml = `
      <div class="task-actions">
        <button class="task-action-btn" data-key="${key}" data-shift="1">+1 day</button>
        <button class="task-action-btn" data-key="${key}" data-shift="7">+1 wk</button>
        <button class="task-action-btn" data-key="${key}" data-shift="14">+2 wk</button>
        <input type="date" class="task-action-date" data-key="${key}" data-custom-date value="${t.due || ''}">
        <button class="task-action-btn" data-key="${key}" data-action="confirm-cancel" style="opacity:.6">Cancel</button>
      </div>`;
    }

    el.innerHTML = `
      <div class="task-row">
        <button class="task-check" data-key="${key}" data-action="open-menu" aria-label="Task options">${t.done ? '✓' : ''}</button>
        <button class="task-title ${t.done ? 'done-text' : ''}" data-key="${key}" data-action="open-menu">${t.title}${t._project ? `<br><span style="font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);opacity:.75">${t._project.split('—')[0].trim()}</span>` : ''}</button>
        ${t.due ? `<button class="task-due ${!t.done && n !== null && n < 0 ? 'overdue' : ''}" data-key="${key}" data-action="open-menu">${fmtDate(t.due)}</button>` : `<button class="task-due" data-key="${key}" data-action="open-menu" style="opacity:.6">set date</button>`}
      </div>
      ${actionsHtml}
    `;

    list.appendChild(el);
  });

  function findTask(key) {
    return all.find(x => taskKey(x._project || null, x.title) === key);
  }

  // Any click on the row (checkbox, title, or due date) opens the confirm menu —
  // never toggles done directly, so a stray click can't silently complete a task.
  list.querySelectorAll('[data-action="open-menu"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      taskMenuState.set(key, taskMenuState.get(key) === 'confirm' ? 'closed' : 'confirm');
      buildTasks();
    });
  });

  list.querySelectorAll('[data-action="confirm-done"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = findTask(btn.dataset.key);
      taskMenuState.set(btn.dataset.key, 'closed');
      setTaskOverride(t._project || null, t.title, { done: !t.done });
    });
  });

  list.querySelectorAll('[data-action="confirm-reschedule"]').forEach(btn => {
    btn.addEventListener('click', () => {
      taskMenuState.set(btn.dataset.key, 'reschedule');
      buildTasks();
    });
  });

  list.querySelectorAll('[data-action="confirm-cancel"]').forEach(btn => {
    btn.addEventListener('click', () => {
      taskMenuState.set(btn.dataset.key, 'closed');
      buildTasks();
    });
  });

  list.querySelectorAll('[data-shift]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = findTask(btn.dataset.key);
      const base = t.due || today.toISOString().slice(0, 10);
      const newDate = addDays(base, parseInt(btn.dataset.shift, 10));
      taskMenuState.set(btn.dataset.key, 'closed');
      setTaskOverride(t._project || null, t.title, { due: newDate });
    });
  });

  list.querySelectorAll('[data-custom-date]').forEach(input => {
    input.addEventListener('change', () => {
      const t = findTask(input.dataset.key);
      taskMenuState.set(input.dataset.key, 'closed');
      setTaskOverride(t._project || null, t.title, { due: input.value });
    });
  });
}

// ── STATS ─────────────────────────────────────────────────────────────
function buildStats() {
  const active = DATA.projects.filter(p => p.status !== 'done' && p.status !== 'paused').length;
  const urgent = DATA.projects.filter(p => {
    const n = daysUntil(p.deadline);
    return p.status !== 'done' && n !== null && n <= 3;
  }).length;
  const projTaskCount = DATA.projects.reduce((sum, p) => sum + (p.tasks || []).filter(t => !t.done).length, 0);
  const openTasks = DATA.tasks.filter(t => !t.done).length + projTaskCount;

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('stat-tasks').textContent = openTasks;
}

// ── TOGGLE ────────────────────────────────────────────────────────────
function toggleIter(btn) {
  const body = btn.nextElementSibling;
  const arrow = btn.querySelector('.toggle-arrow');
  const open = body.classList.toggle('open');
  arrow.style.transform = open ? 'rotate(90deg)' : '';
  btn.setAttribute('aria-expanded', open);
}

// ── TODAY STRIP ───────────────────────────────────────────────────────
function buildTodayStrip() {
  document.getElementById('today-strip-date').textContent = today.toLocaleDateString('en-US', {
    weekday: 'long', month: 'short', day: 'numeric'
  });

  const list = document.getElementById('today-strip-list');
  list.innerHTML = '';

  const projTasks = DATA.projects.flatMap(p =>
    (p.tasks || []).map(t => ({ ...t, _project: p.name }))
  );
  const allTasks = [...DATA.tasks, ...projTasks];

  const overdue = allTasks.filter(t => !t.done && t.due && daysUntil(t.due) < 0);
  const dueToday = allTasks.filter(t => !t.done && t.due && daysUntil(t.due) === 0);
  const deadlinesToday = DATA.projects.filter(p => p.deadline && daysUntil(p.deadline) === 0);

  const items = [
    ...overdue.map(t => ({ ...t, kind: 'overdue' })),
    ...dueToday.map(t => ({ ...t, kind: 'today' })),
    ...deadlinesToday.map(p => ({ title: `${p.name.split('—')[0].trim()} — project deadline`, _project: p.name, kind: 'deadline' })),
  ];

  if (!items.length) {
    list.innerHTML = `<div class="today-strip-empty">Nothing due today or overdue. Next up is in Upcoming Deadlines / Open Tasks →</div>`;
    return;
  }

  items.forEach(it => {
    const chip = document.createElement('div');
    chip.className = 'today-chip' + (it.kind === 'overdue' ? ' overdue' : it.kind === 'deadline' ? ' deadline' : '');
    chip.innerHTML = `
      <div>
        <div class="today-chip-title">${it.title}</div>
        <div class="today-chip-sub">${it.kind === 'overdue' ? 'Overdue' : it.kind === 'deadline' ? 'Deadline' : 'Due today'}${it._project ? ` · ${it._project.split('—')[0].trim()}` : ''}</div>
      </div>`;
    list.appendChild(chip);
  });
}
