name: Jarvis
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
targets:
  Jarvis:
    type: application
    platform: iOS
    sources: [Jarvis]
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.9"
    info:
      path: Jarvis/Info.plist
      properties:
        CFBundleDisplayName: Jarvis
        NSMicrophoneUsageDescription: Jarvis listens for your voice commands.
        NSSpeechRecognitionUsageDescription: Jarvis transcribes what you say.
        LSApplicationQueriesSchemes: [spotify]
        CFBundleURLTypes:
          - CFBundleURLName: com.yourname.jarvis
            CFBundleURLSchemes: [jarvis]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UILaunchScreen: {}
