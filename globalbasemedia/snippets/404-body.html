  <style>
  /* 404 — full-screen video that melts into the page bg, macOS-style dock below */
  .nf{position:relative;height:100vh;height:100svh;min-height:620px;background:var(--bg);overflow:hidden}
  .nf video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  /* vignette: fade every edge of the video into the page background */
  .nf .veil{position:absolute;inset:0;pointer-events:none;
    background:
      linear-gradient(to bottom,var(--bg),transparent 22%),
      linear-gradient(to top,var(--bg) 4%,transparent 34%),
      linear-gradient(to right,var(--bg),transparent 14%),
      linear-gradient(to left,var(--bg),transparent 14%);
    box-shadow:inset 0 0 160px 40px var(--bg)}
  .nf .low{position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;flex-direction:column;align-items:center;gap:16px;padding-bottom:26px}
  .nf .hint{font-size:.86rem;color:var(--muted);letter-spacing:.02em;text-shadow:0 2px 14px rgba(0,0,0,.8)}
  .nf .hint b{color:#fff;font-weight:700}
  /* ——— the dock ——— */
  .dock{display:flex;align-items:flex-end;gap:9px;padding:9px 13px;border-radius:24px;
    background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
    box-shadow:0 24px 60px rgba(0,0,0,.55)}
  .dock a{position:relative;display:grid;place-items:center;width:56px;height:56px;border-radius:15px;
    transition:width .14s ease-out,height .14s ease-out,border-radius .14s ease-out;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 8px 18px rgba(0,0,0,.4)}
  .dock a svg{width:46%;height:46%;color:#fff;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))}
  .dock .sep{width:1px;align-self:stretch;margin:6px 3px;background:rgba(255,255,255,.22);border-radius:1px}
  .dock .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  .dock a::after{content:attr(data-label);position:absolute;bottom:calc(100% + 12px);left:50%;translate:-50% 0;
    background:rgba(12,9,24,.92);border:1px solid rgba(255,255,255,.16);color:#fff;
    padding:5px 11px;border-radius:9px;font-size:.72rem;font-weight:600;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .15s}
  .dock a:hover::after{opacity:1}

  .dk2{background:linear-gradient(145deg,#7c3aed,#c084fc)}
  .dk3{background:linear-gradient(145deg,#059669,#34d399)}
  .dk4{background:linear-gradient(145deg,#f59e0b,#fbbf24)}
  .dk5{background:linear-gradient(145deg,#f43f5e,#fb923c)}
  .dk6{background:linear-gradient(145deg,#06b6d4,#22d3ee)}
  .dk7{background:linear-gradient(145deg,#ec4899,#f472b6)}
  .dk8{background:linear-gradient(145deg,#6366f1,#818cf8)}
  .dk9{background:linear-gradient(145deg,#10b981,#34d399)}
  .dk10{background:linear-gradient(145deg,#22c55e,#4ade80)}
  @media(hover:none),(max-width:820px){
    .nf .low{padding-bottom:18px}
    .dock{max-width:94vw;overflow-x:auto;gap:8px;padding:8px 11px;scrollbar-width:none}
    .dock::-webkit-scrollbar{display:none}
    .dock a{width:44px;height:44px;border-radius:12px;flex:0 0 auto}
    .dock a::after{display:none}
  }
  </style>

  <script>
  (function(){
    var dock=document.querySelector(".dock");
    if(!dock)return;
    var items=Array.prototype.slice.call(dock.querySelectorAll("a"));
    var BASE=56,MAX=1.75,RADIUS=120;
    var canHover=window.matchMedia&&window.matchMedia("(hover:hover)").matches&&window.innerWidth>820;
    if(!canHover)return;
    var raf=null,mx=null;
    function paint(){
      raf=null;
      for(var i=0;i<items.length;i++){
        var it=items[i];
        if(mx===null){it.style.width=it.style.height="";continue;}
        var r=it.getBoundingClientRect();
        var d=Math.abs(mx-(r.left+r.width/2));
        var g=Math.exp(-(d*d)/(2*RADIUS*RADIUS));
        var s=Math.round(BASE*(1+(MAX-1)*g));
        it.style.width=it.style.height=s+"px";
      }
    }
    document.addEventListener("mousemove",function(e){
      var r=dock.getBoundingClientRect();
      var inZone=e.clientX>r.left-60&&e.clientX<r.right+60&&e.clientY>r.top-46&&e.clientY<r.bottom+24;
      var next=inZone?e.clientX:null;
      if(next===mx&&next===null)return;
      mx=next;
      if(!raf)raf=requestAnimationFrame(paint);
    },{passive:true});
  })();
  </script>
